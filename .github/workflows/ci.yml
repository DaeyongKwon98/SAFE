name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m unittest discover -s tests -v
      - run: python -m compileall -q safe tests
      - run: python -m safe --help
      - name: Public-repository checks
        run: |
          ! grep -R "/workspace/daeyong" --include='*.py' --include='*.sh' --include='*.md' .
          ! grep -R "from vllm\|import vllm" --include='*.py' .
          ! find . -path ./.git -prune -o -name 'Untitled*' -print | grep .
      - name: Check documentation links
        run: python scripts/check_docs.py

